<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CitationSync</title>
    <style>
        :root {
            --primary-color: #003366; 
            --accent-color: #ff5c2a;  
            --bg-color: #f4f7f6;      
            --text-main: #333333;     
            --text-light: #666666;    
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        .login-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .login-left {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-color) 0%, #001f3f 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .login-left::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 250px;
            height: 250px;
            background: var(--accent-color);
            border-radius: 50%;
            opacity: 0.15;
        }

        .login-left::after {
            content: '';
            position: absolute;
            bottom: -100px;
            right: -50px;
            width: 350px;
            height: 350px;
            background: var(--accent-color);
            border-radius: 50%;
            opacity: 0.1;
        }

        .login-left-content {
            z-index: 1;
            max-width: 500px;
            text-align: center;
        }

        .login-left h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            font-weight: 800;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-left h1::before {
            content: '';
            display: inline-block;
            width: 18px;
            height: 18px;
            background-color: var(--accent-color);
            border-radius: 50%;
            margin-right: 15px;
        }

        .login-left p {
            font-size: 1.2em;
            opacity: 0.9;
            line-height: 1.6;
            font-weight: 300;
        }

        .login-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: var(--bg-color);
        }

        .login-card {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border-color);
            border-top: 6px solid var(--accent-color);
        }

        .login-card h2 {
            font-size: 2.2em;
            margin-bottom: 10px;
            color: var(--primary-color);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-color);
            font-size: 0.95em;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.2s ease;
            background-color: #fafbfe;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
        }

        button {
            width: 100%;
            background: var(--accent-color);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(255, 92, 42, 0.2);
            margin-top: 10px;
        }

        button:hover {
            background: #e64a19;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(255, 92, 42, 0.3);
        }

        .alert {
            padding: 16px 20px;
            border-radius: 6px;
            margin-top: 25px;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .alert-error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }

        @media (max-width: 900px) {
            .login-container {
                flex-direction: column;
            }
            .login-left {
                flex: 0.4;
                padding: 40px 20px;
            }
            .login-right {
                flex: 0.6;
                padding: 20px;
            }
            .login-card {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="login-left-content">
                <h1>CitationSync</h1>
                <p>Welcome back! Sign in to continue managing backlink citations and improving local SEO for your cafes efficiently.</p>
            </div>
        </div>
        <div class="login-right">
            <div class="login-card">
                <h2>Sign In</h2>
                <p style="color: #666; margin-bottom: 30px;">Use your organization email to continue.</p>

                <form method="post">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="you@company.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit">Sign In to Dashboard</button>
                </form>

                {% if error %}
                <div class="alert alert-error">{{ error }}</div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
